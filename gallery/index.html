<script type="module">
  const createMediaDialog = () => {
    const dialog = document.createElement("dialog");
    dialog.className = "media-dialog";
    dialog.innerHTML = `
      <button class="media-dialog-close" type="button" aria-label="Close preview">x</button>
      <div class="media-dialog-body"></div>
    `;
    document.body.appendChild(dialog);

    const body = dialog.querySelector(".media-dialog-body");
    const closeButton = dialog.querySelector(".media-dialog-close");
    let cleanupCurrent = null;

    closeButton.addEventListener("click", () => dialog.close());
    dialog.addEventListener("click", (event) => {
      if (event.target === dialog) dialog.close();
    });
    dialog.addEventListener("close", () => {
      if (cleanupCurrent) cleanupCurrent();
      cleanupCurrent = null;
      body.innerHTML = "";
      delete dialog.dataset.mediaType;
    });

    return {
      body,
      openHtml(html) {
        body.innerHTML = html;
        dialog.dataset.mediaType = "default";
        dialog.showModal();
      },
      openNode(node, mediaType = "default") {
        body.innerHTML = "";
        dialog.dataset.mediaType = mediaType;
        body.appendChild(node);
        dialog.showModal();
        cleanupCurrent = typeof node.cleanup === "function" ? node.cleanup : null;
        if (typeof node.activate === "function") node.activate();
      },
    };
  };

  const mediaDialog = createMediaDialog();

  const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

  const readNumericAttribute = (element, name) => {
    const value = element?.getAttribute(name) || "";
    if (!value || value.includes("%")) return 0;

    const number = Number.parseFloat(value);
    return Number.isFinite(number) ? number : 0;
  };

  const createZoomViewer = ({ label, content, getContentSize, fitUpscaleLimit = 1, onReady }) => {
    const viewer = document.createElement("div");
    viewer.className = "media-image-viewer";
    viewer.innerHTML = `
      <div class="media-image-stage" tabindex="0"></div>
      <div class="media-image-controls" aria-label="Zoom controls">
        <button class="media-zoom-button" type="button" data-zoom-out aria-label="Zoom out" title="Zoom out">-</button>
        <span class="media-zoom-level" aria-live="polite">100%</span>
        <button class="media-zoom-button" type="button" data-zoom-reset aria-label="Reset zoom" title="Reset zoom">Fit</button>
        <button class="media-zoom-button" type="button" data-zoom-in aria-label="Zoom in" title="Zoom in">+</button>
      </div>
    `;

    const stage = viewer.querySelector(".media-image-stage");
    const contentFrame = document.createElement("div");
    const zoomOutButton = viewer.querySelector("[data-zoom-out]");
    const zoomResetButton = viewer.querySelector("[data-zoom-reset]");
    const zoomInButton = viewer.querySelector("[data-zoom-in]");
    const zoomLevel = viewer.querySelector(".media-zoom-level");
    const pointerPositions = new Map();

    stage.setAttribute("aria-label", label);
    contentFrame.className = "media-zoom-content";
    contentFrame.appendChild(content);
    stage.appendChild(contentFrame);

    let naturalWidth = 1;
    let naturalHeight = 1;
    let fitScale = 1;
    let scale = 1;
    let panX = 0;
    let panY = 0;
    let dragStart = null;
    let pinchStart = null;
    let resizeObserver = null;

    const maxScale = () => Math.max(fitScale * 12, 6);

    const viewport = () => ({
      width: Math.max(1, stage.clientWidth),
      height: Math.max(1, stage.clientHeight),
    });

    const pointFromEvent = (event) => {
      const rect = stage.getBoundingClientRect();
      return {
        x: event.clientX - rect.left - rect.width / 2,
        y: event.clientY - rect.top - rect.height / 2,
      };
    };

    const midpoint = (first, second) => {
      const rect = stage.getBoundingClientRect();
      return {
        x: (first.clientX + second.clientX) / 2 - rect.left - rect.width / 2,
        y: (first.clientY + second.clientY) / 2 - rect.top - rect.height / 2,
      };
    };

    const distance = (first, second) => Math.hypot(first.clientX - second.clientX, first.clientY - second.clientY);

    const clampPan = () => {
      const { width, height } = viewport();
      const overflowX = Math.max(0, (naturalWidth * scale - width) / 2);
      const overflowY = Math.max(0, (naturalHeight * scale - height) / 2);
      panX = clamp(panX, -overflowX, overflowX);
      panY = clamp(panY, -overflowY, overflowY);
    };

    const render = () => {
      const { width, height } = viewport();
      const isDraggable = naturalWidth * scale > width + 1 || naturalHeight * scale > height + 1;

      contentFrame.style.width = `${naturalWidth}px`;
      contentFrame.style.height = `${naturalHeight}px`;
      contentFrame.style.transform = `translate(-50%, -50%) translate(${panX}px, ${panY}px) scale(${scale})`;

      zoomLevel.textContent = `${Math.round((scale / fitScale) * 100)}%`;
      zoomOutButton.disabled = scale <= fitScale + 0.001;
      zoomResetButton.disabled = Math.abs(scale - fitScale) < 0.001 && Math.abs(panX) < 0.5 && Math.abs(panY) < 0.5;
      zoomInButton.disabled = scale >= maxScale() - 0.001;
      stage.classList.toggle("is-draggable", isDraggable);
    };

    const setZoom = (nextScale, origin = { x: 0, y: 0 }) => {
      const clampedScale = clamp(nextScale, fitScale, maxScale());
      if (Math.abs(clampedScale - scale) < 0.001) return;

      const ratio = clampedScale / scale;
      panX = origin.x - ratio * (origin.x - panX);
      panY = origin.y - ratio * (origin.y - panY);
      scale = clampedScale;
      clampPan();
      render();
    };

    const resetZoom = () => {
      scale = fitScale;
      panX = 0;
      panY = 0;
      render();
    };

    const syncFit = (preserveZoom = true) => {
      const size = getContentSize();
      if (!size.width || !size.height) return;

      const previousFit = fitScale;
      const previousRatio = previousFit > 0 ? scale / previousFit : 1;
      const { width, height } = viewport();
      const upscaleLimit = typeof fitUpscaleLimit === "function" ? fitUpscaleLimit() : fitUpscaleLimit;

      naturalWidth = size.width;
      naturalHeight = size.height;
      fitScale = Math.max(0.05, Math.min(width / naturalWidth, height / naturalHeight, upscaleLimit));
      scale = preserveZoom ? clamp(fitScale * previousRatio, fitScale, maxScale()) : fitScale;
      clampPan();
      render();
    };

    const markReady = () => syncFit(false);

    zoomOutButton.addEventListener("click", () => setZoom(scale / 1.25));
    zoomResetButton.addEventListener("click", resetZoom);
    zoomInButton.addEventListener("click", () => setZoom(scale * 1.25));

    stage.addEventListener("wheel", (event) => {
      event.preventDefault();
      setZoom(scale * (event.deltaY < 0 ? 1.16 : 1 / 1.16), pointFromEvent(event));
    }, { passive: false });

    stage.addEventListener("dblclick", (event) => {
      const nextScale = scale <= fitScale * 1.05 ? Math.min(fitScale * 2.5, maxScale()) : fitScale;
      setZoom(nextScale, pointFromEvent(event));
      if (nextScale === fitScale) resetZoom();
    });

    stage.addEventListener("keydown", (event) => {
      if (event.key === "+" || event.key === "=") {
        event.preventDefault();
        setZoom(scale * 1.25);
      } else if (event.key === "-") {
        event.preventDefault();
        setZoom(scale / 1.25);
      } else if (event.key === "0") {
        event.preventDefault();
        resetZoom();
      }
    });

    stage.addEventListener("pointerdown", (event) => {
      if (event.pointerType === "mouse" && event.button !== 0) return;

      stage.setPointerCapture(event.pointerId);
      pointerPositions.set(event.pointerId, { clientX: event.clientX, clientY: event.clientY });
      stage.classList.add("is-dragging");

      if (pointerPositions.size === 1) {
        dragStart = { clientX: event.clientX, clientY: event.clientY, panX, panY };
        pinchStart = null;
      } else if (pointerPositions.size === 2) {
        const points = [...pointerPositions.values()];
        pinchStart = {
          distance: Math.max(1, distance(points[0], points[1])),
          center: midpoint(points[0], points[1]),
          scale,
          panX,
          panY,
        };
        dragStart = null;
      }
    });

    stage.addEventListener("pointermove", (event) => {
      if (!pointerPositions.has(event.pointerId)) return;

      pointerPositions.set(event.pointerId, { clientX: event.clientX, clientY: event.clientY });

      if (pointerPositions.size === 2 && pinchStart) {
        const points = [...pointerPositions.values()];
        const currentDistance = distance(points[0], points[1]);
        const currentCenter = midpoint(points[0], points[1]);
        const nextScale = clamp(pinchStart.scale * (currentDistance / pinchStart.distance), fitScale, maxScale());
        const ratio = nextScale / pinchStart.scale;

        scale = nextScale;
        panX = currentCenter.x - (pinchStart.center.x - pinchStart.panX) * ratio;
        panY = currentCenter.y - (pinchStart.center.y - pinchStart.panY) * ratio;
        clampPan();
        render();
      } else if (pointerPositions.size === 1 && dragStart) {
        panX = dragStart.panX + event.clientX - dragStart.clientX;
        panY = dragStart.panY + event.clientY - dragStart.clientY;
        clampPan();
        render();
      }
    });

    const endPointer = (event) => {
      if (stage.hasPointerCapture(event.pointerId)) stage.releasePointerCapture(event.pointerId);
      pointerPositions.delete(event.pointerId);
      pinchStart = null;

      if (pointerPositions.size === 1) {
        const point = [...pointerPositions.values()][0];
        dragStart = { clientX: point.clientX, clientY: point.clientY, panX, panY };
      } else {
        dragStart = null;
        stage.classList.remove("is-dragging");
      }
    };

    stage.addEventListener("pointerup", endPointer);
    stage.addEventListener("pointercancel", endPointer);

    viewer.activate = () => {
      resizeObserver = new ResizeObserver(() => syncFit(true));
      resizeObserver.observe(stage);
      stage.focus({ preventScroll: true });
      if (onReady) {
        onReady(markReady);
      } else {
        markReady();
      }
    };

    viewer.cleanup = () => {
      if (resizeObserver) resizeObserver.disconnect();
    };

    return viewer;
  };

  const createImageViewer = (sourceImage) => {
    const previewImage = document.createElement("img");
    const source = sourceImage.currentSrc || sourceImage.src;

    previewImage.className = "media-dialog-image";
    previewImage.alt = sourceImage.alt || "";
    previewImage.draggable = false;
    previewImage.src = source;

    return createZoomViewer({
      label: "Image preview",
      content: previewImage,
      fitUpscaleLimit: /\.svg(?:$|[?#])/i.test(source) ? 4 : 1,
      getContentSize: () => ({
        width: previewImage.naturalWidth,
        height: previewImage.naturalHeight,
      }),
      onReady: (ready) => {
        if (previewImage.complete && previewImage.naturalWidth) {
          ready();
        } else {
          previewImage.addEventListener("load", ready, { once: true });
        }
      },
    });
  };

  const createMermaidViewer = (renderedDiagram) => {
    const mermaidContent = document.createElement("div");
    mermaidContent.className = "media-dialog-mermaid";
    mermaidContent.innerHTML = renderedDiagram.innerHTML;

    return createZoomViewer({
      label: "Diagram preview",
      content: mermaidContent,
      fitUpscaleLimit: 4,
      getContentSize: () => {
        const svg = mermaidContent.querySelector("svg");
        if (!svg) {
          const rect = mermaidContent.getBoundingClientRect();
          return { width: rect.width, height: rect.height };
        }

        const viewBox = svg.viewBox?.baseVal;
        let box = null;

        try {
          box = svg.getBBox();
        } catch {
          box = null;
        }

        return {
          width: Math.max(1, viewBox?.width || readNumericAttribute(svg, "width") || box?.width || svg.getBoundingClientRect().width),
          height: Math.max(1, viewBox?.height || readNumericAttribute(svg, "height") || box?.height || svg.getBoundingClientRect().height),
        };
      },
    });
  };

  document.querySelectorAll(".gallery-image-button, .content-image-button").forEach((button) => {
    button.addEventListener("click", () => {
      const image = button.querySelector("img");
      if (!image) return;

      mediaDialog.openNode(createImageViewer(image), "zoom");
    });
  });
</script>
